<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Internal — Satuan Intelijen Kodam XXIII</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#2F4F2F;--green-lt:#3d6b3d;--accent:#4a9e4a;--accent-glow:rgba(74,158,74,.3);
  --black:#050a05;--dark:#0d1a0d;--mid:#1c2e1c;--border:rgba(74,158,74,.2);--border-lt:rgba(74,158,74,.4);
  --text:#c8d8c8;--text-lt:#e8f0e8;--steel:#8a9e8a;--amber:#c8943a;--red:#e05555;
  --font-d:'Barlow Condensed',sans-serif;--font-b:'Barlow',sans-serif;--font-m:'Share Tech Mono',monospace;
}
html,body{height:100%;}
body{
  font-family:var(--font-b);background:var(--black);color:var(--text);
  display:flex;align-items:center;justify-content:center;min-height:100vh;
  overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(74,158,74,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(74,158,74,.05) 1px,transparent 1px);
  background-size:50px 50px;
}
/* Animated BG circles */
.bg-circle{position:fixed;border-radius:50%;border:1px solid rgba(74,158,74,.06);pointer-events:none;z-index:0;}
.bg-circle:nth-child(1){width:600px;height:600px;top:50%;left:50%;transform:translate(-50%,-50%);}
.bg-circle:nth-child(2){width:400px;height:400px;top:50%;left:50%;transform:translate(-50%,-50%);}
.bg-circle:nth-child(3){width:200px;height:200px;top:50%;left:50%;transform:translate(-50%,-50%);}

.login-wrap{position:relative;z-index:1;width:100%;max-width:440px;padding:1.5rem;}
.login-header{text-align:center;margin-bottom:2.5rem;}
.login-emblem{
  width:70px;height:70px;margin:0 auto 1.2rem;
  background:linear-gradient(135deg,var(--green),var(--dark));
  border:1px solid var(--border-lt);
  display:flex;align-items:center;justify-content:center;font-size:1.8rem;
  clip-path:polygon(50% 0%,95% 25%,95% 75%,50% 100%,5% 75%,5% 25%);
  position:relative;
}
.login-emblem::after{
  content:'';position:absolute;inset:0;
  background:conic-gradient(from 0deg,transparent 270deg,rgba(74,158,74,.3) 360deg);
  clip-path:polygon(50% 0%,95% 25%,95% 75%,50% 100%,5% 75%,5% 25%);
  animation:spin 4s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.login-title{font-family:var(--font-d);font-size:1.4rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--text-lt);}
.login-sub{font-family:var(--font-m);font-size:.6rem;color:var(--accent);letter-spacing:.2em;text-transform:uppercase;margin-top:.4rem;}
.access-badge{
  display:inline-flex;align-items:center;gap:.5rem;margin-top:1rem;
  background:rgba(200,148,58,.1);border:1px solid rgba(200,148,58,.3);
  padding:.3rem .9rem;font-family:var(--font-m);font-size:.6rem;color:var(--amber);letter-spacing:.15em;
}
.access-dot{width:5px;height:5px;background:var(--amber);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

.login-card{
  background:rgba(28,46,28,.4);border:1px solid var(--border);
  padding:2rem;backdrop-filter:blur(10px);
  clip-path:polygon(0 0,calc(100% - 16px) 0,100% 16px,100% 100%,16px 100%,0 calc(100% - 16px));
}
.field-group{margin-bottom:1.3rem;}
.field-label{font-family:var(--font-m);font-size:.58rem;color:var(--steel);letter-spacing:.18em;text-transform:uppercase;display:block;margin-bottom:.5rem;}
.field-input{
  width:100%;background:var(--mid);border:1px solid var(--border);color:var(--text-lt);
  padding:.85rem 1rem;font-family:var(--font-b);font-size:.9rem;outline:none;
  transition:border-color .3s,box-shadow .3s;
  clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,0 100%);
}
.field-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
.field-input::placeholder{color:var(--steel);font-size:.85rem;}
.field-pw{position:relative;}
.pw-toggle{position:absolute;right:.8rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--steel);cursor:pointer;font-size:.8rem;padding:.3rem;}
.pw-toggle:hover{color:var(--accent);}

.login-btn{
  width:100%;background:var(--green);border:1px solid var(--green-lt);color:var(--text-lt);
  padding:1rem;font-family:var(--font-d);font-size:1rem;font-weight:700;
  letter-spacing:.15em;text-transform:uppercase;cursor:pointer;margin-top:.5rem;
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
  transition:all .3s;position:relative;overflow:hidden;
}
.login-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);
  transform:translateX(-100%);transition:transform .5s;
}
.login-btn:hover::before{transform:translateX(100%);}
.login-btn:hover:not(:disabled){background:var(--green-lt);box-shadow:0 0 20px var(--accent-glow);}
.login-btn:disabled{opacity:.6;cursor:not-allowed;}

.login-msg{
  margin-top:1rem;padding:.7rem 1rem;font-family:var(--font-m);font-size:.7rem;
  letter-spacing:.05em;display:none;border:1px solid transparent;
}
.login-msg.error{color:var(--red);background:rgba(224,85,85,.08);border-color:rgba(224,85,85,.2);}
.login-msg.success{color:var(--accent);background:rgba(74,158,74,.08);border-color:var(--border);}

.login-footer{text-align:center;margin-top:1.5rem;font-family:var(--font-m);font-size:.58rem;color:var(--steel);letter-spacing:.1em;line-height:1.8;}
.login-footer a{color:var(--accent);text-decoration:none;}
.login-footer a:hover{text-decoration:underline;}

/* Attempt counter */
.attempt-bar{height:2px;background:var(--mid);margin-top:1rem;overflow:hidden;}
.attempt-fill{height:100%;background:var(--red);width:0%;transition:width .3s;}

/* Clock */
.login-clock{font-family:var(--font-m);font-size:.65rem;color:var(--accent);text-align:center;margin-bottom:1.5rem;letter-spacing:.1em;}
</style>
</head>
<body>
<div class="bg-circle"></div>
<div class="bg-circle"></div>
<div class="bg-circle"></div>

<div class="login-wrap">
  <div class="login-header">
    <div class="login-emblem">⬡</div>
    <div class="login-title">Portal Internal</div>
    <div class="login-sub">Satuan Intelijen Kodam XXIII / Palaka Wira</div>
    <div class="access-badge"><div class="access-dot"></div>AKSES TERBATAS — PERSONEL RESMI</div>
  </div>

  <div class="login-clock" id="clock">──</div>

  <div class="login-card">
    <div class="field-group">
      <label class="field-label" for="username">Username</label>
      <input class="field-input" type="text" id="username" placeholder="Masukkan username" autocomplete="username">
    </div>
    <div class="field-group">
      <label class="field-label" for="password">Password</label>
      <div class="field-pw">
        <input class="field-input" type="password" id="password" placeholder="Masukkan password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="pw-toggle" onclick="togglePw()" type="button">👁</button>
      </div>
    </div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">⬡ Masuk ke Portal</button>
    <div class="login-msg" id="loginMsg"></div>
    <div class="attempt-bar"><div class="attempt-fill" id="attemptBar"></div></div>
  </div>

  <div class="login-footer">
    <div>Akses tidak sah merupakan pelanggaran hukum dan dapat dituntut.</div>
    <div style="margin-top:.5rem;"><a href="/">← Kembali ke Halaman Utama</a></div>
  </div>
</div>

<script>
// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleDateString('id-ID',{weekday:'long',year:'numeric',month:'long',day:'numeric'}) +
    ' — ' + now.toLocaleTimeString('id-ID',{timeZone:'Asia/Jayapura'}) + ' WIT';
}
updateClock(); setInterval(updateClock, 1000);

// Toggle PW
function togglePw() {
  const pw = document.getElementById('password');
  pw.type = pw.type === 'password' ? 'text' : 'password';
}

// Login
let attempts = 0;
const MAX_ATTEMPTS = 5;

async function doLogin() {
  if (attempts >= MAX_ATTEMPTS) {
    showMsg('Terlalu banyak percobaan gagal. Tunggu beberapa menit.', 'error'); return;
  }
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const msg = document.getElementById('loginMsg');

  if (!username || !password) { showMsg('Username dan password wajib diisi.', 'error'); return; }

  btn.textContent = '⟳ Memverifikasi...'; btn.disabled = true;

  try {
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();

    if (res.ok && data.token) {
      localStorage.setItem('intel_token', data.token);
      localStorage.setItem('intel_user', username);
      showMsg('✓ Login berhasil. Mengalihkan...', 'success');
      setTimeout(() => { window.location.href = '/admin'; }, 1200);
    } else {
      attempts++;
      document.getElementById('attemptBar').style.width = (attempts / MAX_ATTEMPTS * 100) + '%';
      showMsg((data.error || 'Login gagal.') + ` (${attempts}/${MAX_ATTEMPTS} percobaan)`, 'error');
      btn.textContent = '⬡ Masuk ke Portal'; btn.disabled = false;
    }
  } catch (err) {
    showMsg('Koneksi gagal. Periksa jaringan Anda.', 'error');
    btn.textContent = '⬡ Masuk ke Portal'; btn.disabled = false;
  }
}

function showMsg(text, type) {
  const el = document.getElementById('loginMsg');
  el.textContent = text; el.className = 'login-msg ' + type; el.style.display = 'block';
}

// Check if already logged in
const tok = localStorage.getItem('intel_token');
if (tok) {
  fetch('/api/auth', { headers: { 'Authorization': 'Bearer ' + tok } })
    .then(r => r.json())
    .then(d => { if (d.valid) window.location.href = '/admin'; })
    .catch(() => {});
}
</script>
</body>
</html>
